<style>
:root{
  --void:#000;--t:#00ff41;--td:#00aa2b;--tg:rgba(0,255,65,.3);
  --amber:#ffb300;--ra:#ff2020;--ice:#4fc3f7;--gold:#d4af37;
  --goldl:#f5d76e;--purple:#cc44ff;--rose:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--void);color:var(--t);
  font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
  pointer-events:none;z-index:9998;
}
@keyframes flicker{0%,91%,95%,100%{opacity:1;}93%{opacity:.85;}97%{opacity:.93;}}
@keyframes glitch{0%,100%{text-shadow:0 0 8px var(--t);}2%{text-shadow:-2px 0 #ff0040,2px 0 var(--ice);}4%{text-shadow:2px 0 #ff0040,-2px 0 var(--ice);}6%{text-shadow:0 0 8px var(--t);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--tg);}50%{box-shadow:0 0 30px var(--tg),0 0 60px rgba(0,255,65,.1);}}
@keyframes wrongShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}
@keyframes goldShimmer{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes certReveal{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
@keyframes grandReveal{from{opacity:0;transform:scale(.88) rotateX(8deg);}to{opacity:1;transform:scale(1) rotateX(0);}}
@keyframes rosePulse{0%,100%{box-shadow:0 0 10px rgba(255,107,107,.3);}50%{box-shadow:0 0 40px rgba(255,107,107,.5),0 0 80px rgba(255,107,107,.1);}}
@keyframes typeIn{from{width:0;}to{width:100%;}}
body{animation:flicker 12s infinite;}

/* ── BOOT ── */
#boot-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;padding:2rem;}
.boot-logo{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4vw,2.5rem);font-weight:900;color:var(--t);text-align:center;text-shadow:0 0 30px var(--tg),0 0 60px rgba(0,255,65,.2);animation:glitch 6s infinite;letter-spacing:.3em;margin-bottom:2rem;}
.boot-log{max-width:600px;width:100%;font-size:.8rem;line-height:2;color:var(--td);text-align:left;min-height:200px;}
.boot-bar-wrap{max-width:600px;width:100%;margin-top:1.5rem;}
.boot-bar{height:4px;background:rgba(0,255,65,.15);width:100%;border:1px solid rgba(0,255,65,.3);}
.boot-bar-fill{height:100%;background:var(--t);width:0%;transition:width .05s linear;box-shadow:0 0 10px var(--tg);}
.boot-bar-text{font-size:.75rem;color:var(--td);margin-top:.5rem;}
#name-form{max-width:500px;width:100%;margin-top:2rem;display:none;flex-direction:column;gap:1rem;animation:fadeIn .6s ease;}
#name-form p{color:var(--t);font-size:.9rem;line-height:1.8;}
#name-input{background:transparent;border:none;border-bottom:1px solid var(--t);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:1.1rem;padding:.5rem 0;outline:none;width:100%;text-shadow:0 0 6px var(--tg);}
#name-input::placeholder{color:var(--td);}
#start-btn{background:transparent;border:1px solid var(--t);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:1rem;padding:.7rem 2rem;cursor:pointer;text-shadow:0 0 6px var(--tg);box-shadow:0 0 10px var(--tg);transition:all .3s;align-self:flex-start;letter-spacing:.15em;}
#start-btn:hover{background:rgba(0,255,65,.1);box-shadow:0 0 20px var(--tg);}

/* ── LAYOUT ── */
#main-wrapper{display:none;min-height:100vh;}
.stage{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;position:relative;}
.stage-header{font-family:'Cinzel',serif;font-size:clamp(.7rem,2vw,1rem);color:var(--td);letter-spacing:.4em;margin-bottom:.5rem;text-align:center;}
.stage-title{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,3rem);font-weight:900;color:var(--t);text-align:center;text-shadow:0 0 20px var(--tg),0 0 40px rgba(0,255,65,.15);animation:glitch 8s infinite;letter-spacing:.2em;margin-bottom:2rem;}
.stage-lore{max-width:650px;text-align:center;font-size:.9rem;line-height:2;color:var(--td);margin-bottom:2.5rem;}
.answer-row{display:flex;gap:1rem;align-items:center;max-width:500px;width:100%;flex-wrap:wrap;justify-content:center;}
.answer-input{flex:1;min-width:200px;background:transparent;border:none;border-bottom:1px solid rgba(0,255,65,.5);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:1.1rem;padding:.5rem 0;outline:none;text-shadow:0 0 6px var(--tg);text-align:center;letter-spacing:.1em;}
.answer-input::placeholder{color:rgba(0,255,65,.3);}
.submit-btn{background:transparent;border:1px solid rgba(0,255,65,.5);color:var(--t);font-family:'Share Tech Mono',monospace;font-size:.9rem;padding:.6rem 1.5rem;cursor:pointer;transition:all .3s;letter-spacing:.1em;text-shadow:0 0 6px var(--tg);}
.submit-btn:hover{background:rgba(0,255,65,.1);box-shadow:0 0 20px var(--tg);border-color:var(--t);}
.ascii-deco{color:rgba(0,255,65,.15);font-size:.7rem;line-height:1.4;text-align:center;margin-bottom:1.5rem;pointer-events:none;user-select:none;}
.stage-counter{position:fixed;top:1.5rem;right:1.5rem;font-size:.75rem;color:rgba(0,255,65,.4);letter-spacing:.2em;z-index:100;}
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--t);box-shadow:0 0 8px var(--tg);transition:width .8s ease;z-index:100;}

/* ── STAGE COLOUR THEMES ── */
#stage-2 .stage-title{color:var(--ice);text-shadow:0 0 20px rgba(79,195,247,.4);}
#stage-2 #stage-2 #stage-2 .answer-input{border-color:rgba(79,195,247,.5);color:var(--ice);}

#stage-5 .submit-btn:hover{background:rgba(255,107,107,.1);}
#stage-5 #stage-6 .stage-title{color:var(--goldl);text-shadow:0 0 20px rgba(245,215,110,.4);}
#stage-6 #stage-6 #stage-6 .answer-input{border-color:rgba(245,215,110,.5);color:var(--goldl);}
#stage-6 .submit-btn{border-color:rgba(245,215,110,.5);color:var(--goldl);}
#stage-6 .submit-btn:hover{background:rgba(245,215,110,.1);}
#stage-6 #stage-7 .stage-title{color:#00e5ff;text-shadow:0 0 20px rgba(0,229,255,.4);}
#stage-7 #stage-7 #stage-7 .answer-input{border-color:rgba(0,229,255,.5);color:#00e5ff;}
#stage-7 .submit-btn{border-color:rgba(0,229,255,.5);color:#00e5ff;}
#stage-7 .submit-btn:hover{background:rgba(0,229,255,.1);}
#stage-7 #stage-8 .stage-title{color:#fff;text-shadow:0 0 20px rgba(255,255,255,.5),0 0 40px rgba(255,255,255,.2);}
#stage-8 #stage-8 #stage-8 .answer-input{border-color:rgba(255,255,255,.5);color:#fff;}
#stage-8 .submit-btn{border-color:rgba(255,255,255,.5);color:#fff;}
#stage-8 .submit-btn:hover{background:rgba(255,255,255,.1);}
#stage-8 
/* ── GRID DISPLAY ── */
.pf-grid{display:inline-grid;grid-template-columns:repeat(5,1fr);gap:2px;margin:1rem auto;font-size:.85rem;}
.pf-cell{width:36px;height:36px;display:flex;justify-content:center;align-items:center;border:1px solid rgba(245,215,110,.25);color:rgba(245,215,110,.8);font-family:'Share Tech Mono',monospace;}
.pf-cell.key-letter{color:var(--goldl);border-color:rgba(245,215,110,.6);background:rgba(245,215,110,.07);}
.pf-wrap{text-align:center;margin-bottom:1.5rem;}
.pf-label{font-size:.7rem;color:rgba(245,215,110,.4);letter-spacing:.25em;margin-bottom:.5rem;}

/* ── WEAVE VISUAL ── */
.rf-visual{font-family:'Share Tech Mono',monospace;font-size:.8rem;line-height:2;text-align:left;max-width:100%;overflow-x:auto;color:rgba(0,229,255,.7);padding:.5rem;margin:.5rem 0;}

/* ── WRONG FLASH ── */
#wrong-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,32,32,.06);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:500;pointer-events:none;}
#wrong-flash.show{display:flex;animation:wrongShake .4s ease;}
#wrong-flash h2{font-family:'Cinzel',serif;font-size:2rem;color:var(--ra);text-shadow:0 0 20px rgba(255,32,32,.6);letter-spacing:.2em;}
#wrong-flash p{color:rgba(255,32,32,.7);font-size:.9rem;margin-top:.5rem;}

/* ── TRANSITION OVERLAY ── */
#static-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);z-index:400;display:none;justify-content:center;align-items:center;flex-direction:column;gap:1rem;}
#static-overlay.show{display:flex;}
.static-msg{font-family:'Cinzel',serif;color:var(--t);font-size:1.2rem;letter-spacing:.3em;text-shadow:0 0 20px var(--tg);animation:glitch 1s infinite;text-align:center;padding:0 2rem;}
.static-sub{font-family:'Share Tech Mono',monospace;color:var(--td);font-size:.8rem;letter-spacing:.2em;}

/* ── CERTIFICATE 1 ── */
#certificate-1{min-height:100vh;display:none;justify-content:center;align-items:center;padding:2rem;background:radial-gradient(ellipse at center,#0d0800 0%,#000 70%);flex-direction:column;gap:2rem;}
#certificate-1.visible{display:flex;animation:certReveal .8s ease;}
.cert-wrapper{max-width:800px;width:100%;border:3px solid var(--gold);position:relative;box-shadow:0 0 60px rgba(212,175,55,.3),0 0 120px rgba(212,175,55,.1),inset 0 0 60px rgba(212,175,55,.05);}
.cert-outer-border{border:1px solid rgba(212,175,55,.4);margin:8px;padding:2.5rem 3rem;background:linear-gradient(135deg,#0d0800,#1a1000,#0d0800);}
.cert-corner{position:absolute;font-size:1.5rem;color:var(--gold);text-shadow:0 0 10px rgba(212,175,55,.6);}
.cert-corner.tl{top:12px;left:12px;}.cert-corner.tr{top:12px;right:12px;}
.cert-corner.bl{bottom:12px;left:12px;}.cert-corner.br{bottom:12px;right:12px;}
.cert-top-label{font-family:'Cinzel',serif;font-size:.7rem;color:rgba(212,175,55,.6);letter-spacing:.5em;text-align:center;margin-bottom:.5rem;}
.cert-institution{font-family:'Cinzel',serif;font-size:clamp(.9rem,2.5vw,1.5rem);font-weight:700;color:var(--goldl);text-align:center;letter-spacing:.3em;margin-bottom:.3rem;}
.cert-divider{display:flex;align-items:center;gap:1rem;margin:1rem 0;}
.cert-divider-line{flex:1;height:1px;background:rgba(212,175,55,.3);}
.cert-divider-sym{color:var(--gold);font-size:1rem;}
.cert-main-title{font-family:'Cinzel',serif;font-size:clamp(.7rem,2vw,1rem);color:rgba(212,175,55,.7);text-align:center;letter-spacing:.4em;margin-bottom:.5rem;font-style:italic;}
.cert-says{font-family:'Courier Prime',monospace;font-size:.85rem;color:rgba(212,175,55,.6);text-align:center;margin:1rem 0 .5rem;font-style:italic;}
.cert-name{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,3rem);font-weight:900;text-align:center;background:linear-gradient(90deg,var(--gold),var(--goldl),#fff8e1,var(--goldl),var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 4s linear infinite;margin:.5rem 0;letter-spacing:.1em;}
.cert-body{font-family:'Courier Prime',monospace;font-size:.85rem;color:rgba(212,175,55,.7);text-align:center;line-height:2;margin:1rem 0;}
.cert-achievement{border:1px solid rgba(212,175,55,.25);padding:1rem;margin:1.5rem 0;background:rgba(212,175,55,.04);}
.cert-achievement-title{font-family:'Cinzel',serif;font-size:.75rem;color:rgba(212,175,55,.5);letter-spacing:.3em;text-align:center;margin-bottom:.8rem;}
.cert-stages{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.75rem;color:rgba(212,175,55,.6);}
.cert-stage-item{display:flex;align-items:center;gap:.5rem;}
.cert-stage-item::before{content:'✓';color:var(--gold);}
.cert-sig-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:1.5rem;flex-wrap:wrap;gap:1rem;}
.cert-sig{text-align:center;}
.cert-sig-line{width:140px;height:1px;background:rgba(212,175,55,.4);margin-bottom:.3rem;}
.cert-sig-name{font-size:.7rem;color:rgba(212,175,55,.5);letter-spacing:.15em;}
.cert-date{font-size:.75rem;color:rgba(212,175,55,.5);font-family:'Courier Prime',monospace;}
.cert-seal{width:80px;height:80px;border:2px solid rgba(212,175,55,.4);border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:2rem;color:var(--gold);box-shadow:0 0 20px rgba(212,175,55,.2);}
.cert-motto{font-family:'Cinzel',serif;font-size:.65rem;font-style:italic;color:rgba(212,175,55,.4);letter-spacing:.2em;text-align:center;margin-top:1rem;}
.print-btn{background:transparent;border:1px solid rgba(212,175,55,.5);color:var(--goldl);font-family:'Share Tech Mono',monospace;font-size:.9rem;padding:.8rem 2.5rem;cursor:pointer;letter-spacing:.15em;transition:all .3s;}
.print-btn:hover{background:rgba(212,175,55,.1);box-shadow:0 0 20px rgba(212,175,55,.2);}
.continue-btn{background:transparent;border:1px solid rgba(255,32,32,.4);color:rgba(255,32,32,.8);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:.6rem 1.8rem;cursor:pointer;letter-spacing:.15em;transition:all .3s;margin-top:.5rem;}
.continue-btn:hover{border-color:#ff2020;color:#ff2020;box-shadow:0 0 15px rgba(255,32,32,.2);}
.continue-label{font-size:.65rem;color:rgba(255,32,32,.4);letter-spacing:.15em;margin-top:.5rem;text-align:center;font-family:'Share Tech Mono',monospace;}

/* ── ADVANCED DIVIDER ── */
.advanced-divider{max-width:700px;width:100%;text-align:center;margin-bottom:1.5rem;}
