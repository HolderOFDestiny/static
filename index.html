<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>testtwo</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;text-align:center;margin:0;padding:2rem;transition:all .3s;}
input,button{background:#000;color:#0f0;border:1px solid #0f0;padding:.7rem;margin:.5rem;transition:all .3s;}
button{cursor:pointer;}
#puzzle{margin:2rem 0;font-size:1rem;letter-spacing:.1em;transition:all .3s;}
.cert{display:none;border:3px solid gold;padding:2rem;margin:2rem auto;max-width:700px;transition:all .3s;}
body::before{content:"FILLER GRID 1";opacity:.02;position:fixed;top:0;left:0;width:100%;font-size:8px;}
body::after{content:"PRIME SEQ 2 3 5 7 11";opacity:.02;position:fixed;bottom:0;left:0;width:100%;font-size:8px;}
</style>
</head>
<body>
<h2>testtwo</h2>
<div id="main">
<div id="puzzle"></div>
<input id="ans" placeholder="Type solution">
<br>
<button onclick="submitStage()">Submit</button>
<p id="msg"></p>
</div>

<div id="cert1" class="cert">
<h2>CERTIFICATE: PART I</h2>
<p id="name1"></p>
<button onclick="unlockPart2()">CONTINUE</button>
</div>

<div id="cert2" class="cert">
<h2>GRANDMASTER CERTIFICATE</h2>
<p id="name2"></p>
</div>

<script>
var stage=0,part=1,junk="8272:28##uahqbodl",decoy1=Math.random()*99999,decoy2="auth:none";
var encoded=["TFhGT1BWRSBGUk5IUg==","UU5GSlg=","V1FGR1E=","QUdERkZHRkFHRk==","UEJCTElZQQ==","UU5YRVBLVE1ER0lO","MTMzMDY=","RUJHMTM="];
var answerEnc=["YXR0YWNr","aGVsbG8=","Y2lwaGVy","Z3JpZA==","cmF5","ZGVjb2Rl","MjAyNA==","dHJ1dGg="];

function decodeStr(s){var t=atob(s);var r="";for(var i=0;i<t.length;i++){r+=String.fromCharCode(t.charCodeAt(i)-1);}return r;}
function loadStage(){document.getElementById("puzzle").innerText=decodeStr(encoded[stage]);document.getElementById("ans").value="";document.getElementById("msg").innerText="";}
function unlockPart2(){part=2;stage=4;document.getElementById("cert1").style.display="none";document.getElementById("main").style.display="block";loadStage();}
function showCert1(){var n=prompt("Enter your codename:");document.getElementById("name1").innerText=n;document.getElementById("main").style.display="none";document.getElementById("cert1").style.display="block";}
function showCert2(){var n=prompt("Enter your codename:");document.getElementById("name2").innerText=n;document.getElementById("main").style.display="none";document.getElementById("cert2").style.display="block";}

function submitStage(){
var v=document.getElementById("ans").value.trim().toLowerCase();
var correct=decodeStr(answerEnc[stage]);
if(v===correct){
stage++;
if(part==1&&stage==4){showCert1();return;}
if(part==2&&stage==8){showCert2();return;}
loadStage();
}else{document.getElementById("msg").innerText="";}
}

loadStage();
</script>
</body>
</html>
